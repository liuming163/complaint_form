<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>uc投诉表单</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/xlsx.full.min.js') }}"></script>
</head>
<body>
<header class="main-header shadow-sm">
    <div class="logo-area"><i class="fas fa-search"></i> uc投诉</div>
    <div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</header>

<div class="form-page-wrap">

    <!-- 投诉模版 -->
    <div class="form-card mb-4">
        <div class="section-title"><i class="fas fa-clone"></i> 投诉模版</div>
        <div class="d-flex gap-3">
            <button type="button" class="btn btn-outline-primary" onclick="downloadCustomTemplate()">
                <i class="fas fa-download"></i> 下载自定义模版
            </button>
            <input type="file" id="customTemplateZip" accept=".xlsx,.xls" style="display:none" onchange="handleCustomTemplateUpload(this)">
            <button type="button" class="btn btn-outline-success" onclick="document.getElementById('customTemplateZip').click()">
                <i class="fas fa-upload"></i> 上传自定义模版
            </button>
        </div>
    </div>

    <form id="ucForm" enctype="multipart/form-data">

        <!-- 账号信息 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-user-circle"></i> 账号信息</div>
            <div class="mb-3">
                <label class="form-label">采集账号</label>
                <input type="text" class="form-control" name="collect_account" placeholder="请输入采集账号" value="" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cookie</label>
                <textarea class="form-control" name="cookie" rows="3" placeholder="请输入Cookie信息" required></textarea>
                <div class="form-text">请粘贴完整的Cookie信息，用于身份验证</div>
            </div>
        </div>

        <!-- 身份信息 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-user"></i> 身份信息</div>
            <div class="mb-3">
                <label class="form-label">您的身份</label>
                <div class="d-flex gap-4" id="identityRadios">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="identity" id="id_rightsholder" value="权利人" disabled onchange="onIdentityChange()">
                        <label class="form-check-label" for="id_rightsholder">权利人</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="identity" id="id_agent" value="代理人" checked disabled onchange="onIdentityChange()">
                        <label class="form-check-label" for="id_agent">代理人</label>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <select class="form-select" name="agent" id="identitySelect" required disabled>
                    <option value="北京和晞科技有限公司">北京和晞科技有限公司</option>
                </select>
            </div>
            <div id="principalWrap" class="locked-section">
                <div class="mb-3">
                    <label class="form-label">被代理人（权利人）信息</label>
                    <select class="form-select" name="principal" required disabled>
                        <option value="">请选择被代理人</option>
                        <option>腾讯科技（北京）有限公司</option>
                        <option>深圳市腾讯计算机系统有限公司</option>
                        <option>上海腾讯企鹅影视文化传播有限公司</option>
                        <option>北京卡路里科技有限公司</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- 投诉类型 -->
        <div class="form-card locked-section">
            <div class="section-title"><i class="fas fa-tag"></i> 投诉类型</div>
            <div class="mb-3">
                <div class="d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="complaint_category" id="cat_ip" value="知识产权" checked disabled>
                        <label class="form-check-label" for="cat_ip">知识产权</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="complaint_category" id="cat_personal" value="人身权" disabled>
                        <label class="form-check-label" for="cat_personal">人身权</label>
                    </div>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_copyright" value="著作权（含视频、图文、图集等）" checked disabled>
                    <label class="form-check-label" for="type_copyright">著作权（含视频、图文、图集等）</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_trademark" value="商标" disabled>
                    <label class="form-check-label" for="type_trademark">商标</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_patent" value="专利" disabled>
                    <label class="form-check-label" for="type_patent">专利</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_other_ip" value="其他知识产权" disabled>
                    <label class="form-check-label" for="type_other_ip">其他知识产权</label>
                </div>
            </div>
        </div>

        <!-- 功能模块 -->
        <div class="form-card locked-section">
            <div class="section-title"><i class="fas fa-th-large"></i> 功能模块</div>
            <div class="d-flex flex-wrap gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_pan" value="头条内容" checked disabled>
                    <label class="form-check-label" for="mod_pan">头条内容</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_img" value="大鱼号账号" disabled>
                    <label class="form-check-label" for="mod_img">大鱼号账号</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_news" value="UC网盘" disabled>
                    <label class="form-check-label" for="mod_news">UC网盘</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_search" value="神马搜索" disabled>
                    <label class="form-check-label" for="mod_search">神马搜索</label>
                </div>
            </div>
        </div>

        <!-- 内容类型 -->
        <div class="form-card locked-section">
            <div class="section-title"><i class="fas fa-film"></i> 内容类型</div>
            <div class="d-flex flex-wrap gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_drama" value="影视剧集" checked disabled>
                    <label class="form-check-label" for="ct_drama">影视剧集</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_video" value="其他视频" disabled>
                    <label class="form-check-label" for="ct_video">其他视频</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_novel" value="小说" disabled>
                    <label class="form-check-label" for="ct_novel">小说</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_comic" value="漫画" disabled>
                    <label class="form-check-label" for="ct_comic">漫画</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_image" value="图片" disabled>
                    <label class="form-check-label" for="ct_image">图片</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_article" value="文章" disabled>
                    <label class="form-check-label" for="ct_article">文章</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_software" value="软件/游戏" disabled>
                    <label class="form-check-label" for="ct_software">软件/游戏</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_other" value="其他" disabled>
                    <label class="form-check-label" for="ct_other">其他</label>
                </div>
            </div>
        </div>

        <!-- 投诉内容 -->
        <div class="form-card locked-section">
            <div class="section-title"><i class="fas fa-file-import"></i> 投诉内容</div>
            <div class="mb-3">
                <label class="form-label">批量导入（Excel，系统将按2行/批自动提交）</label>
                <div class="upload-drop-zone locked-upload" id="excelDropZone">
                    <i class="fas fa-file-excel fa-2x mb-2" style="color:#bcaaa4"></i>
                    <div>点击或拖拽上传 Excel 文件</div>
                    <div style="font-size:11px;color:#bbb">支持 .xlsx .xls</div>
                </div>
                <input type="file" id="excelFile" name="excel_file" accept=".xlsx,.xls" style="display:none" disabled>
                <div id="excelInfo" class="file-info"></div>
                <div id="excelError" class="file-error"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">投诉内容描述</label>
                <textarea class="form-control" name="description" rows="4" placeholder="请填写投诉内容描述..." disabled></textarea>
            </div>
        </div>

        <!-- 证明材料 -->
        <div class="form-card locked-section">
            <div class="section-title"><i class="fas fa-paperclip"></i> 证明材料</div>
            <div class="mb-3">
                <label class="form-label">证明文件</label>
                <div class="file-upload-box locked-upload" id="proofFileBox">
                    <div class="file-upload-placeholder" id="proofFilePlaceholder">
                        <i class="fas fa-plus fa-lg"></i>
                        <div class="mt-1" style="font-size:12px">点击上传</div>
                    </div>
                    <img id="proofFilePreview" class="file-upload-preview" style="display:none">
                    <div id="proofFileNonImg" class="file-upload-nonimg" style="display:none"></div>
                </div>
                <input type="file" id="proof_file_input" name="proof_file" accept=".png,.jpg,.jpeg,.bmp,.pdf" style="display:none" disabled>
                <div class="file-info" id="proofFileInfo"></div>
                <div class="form-text">支持 .png .jpg .jpeg .bmp .pdf</div>
            </div>
            <div class="mb-3">
                <label class="form-label">其他证明</label>
                <div class="d-flex flex-wrap gap-2" id="otherProofList"></div>
                <div class="file-upload-box file-upload-box-sm mt-2 locked-upload" id="otherProofAddBtn">
                    <div class="file-upload-placeholder">
                        <i class="fas fa-plus fa-lg"></i>
                        <div class="mt-1" style="font-size:12px">点击上传</div>
                    </div>
                </div>
                <input type="file" id="other_proof_file_input" name="other_proof_file" accept=".png,.jpg,.jpeg,.bmp,.pdf" multiple style="display:none" disabled>
                <div class="file-info" id="otherProofInfo"></div>
                <div class="form-text">支持 .png .jpg .jpeg .bmp .pdf</div>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" id="submitBtn" class="btn btn-brown px-5">提交投诉</button>
        </div>

    </form>
</div>

<script>
// 身份切换
function onIdentityChange() {
    const isAgent = document.getElementById('id_agent').checked;
    const select = document.getElementById('identitySelect');
    const principalWrap = document.getElementById('principalWrap');
    const principal = document.querySelector('select[name="principal"]');

    select.innerHTML = isAgent
        ? '<option value="北京和晞科技有限公司">北京和晞科技有限公司</option>'
        : '<option value="刘明">刘明</option>';

    principalWrap.style.display = isAgent ? 'block' : 'none';
    if (principal) {
        principal.required = isAgent;
    }

    if (!isAgent) {
        if (principal) {
            principal.classList.remove('is-invalid');
            const feedback = principal.parentNode.querySelector('.invalid-feedback');
            if (feedback) feedback.remove();
        }
    }
}

// 启用所有锁定字段（模板应用前）
function enableLockedFields() {
    // 启用所有disabled的表单元素
    document.querySelectorAll('input, select, textarea').forEach(el => {
        el.disabled = false;
        el.style.pointerEvents = 'auto';
        el.style.opacity = '1';
    });
    // 移除上传区域的锁定样式
    document.querySelectorAll('.locked-upload').forEach(el => {
        el.classList.remove('locked-upload');
        el.style.cursor = 'pointer';
        el.style.opacity = '1';
    });
    // 移除区域锁定样式
    document.querySelectorAll('.locked-section').forEach(el => {
        el.classList.remove('locked-section');
    });
}

// 锁定除账号信息外的所有字段（模板应用后）
function lockAllFieldsExceptAccount() {
    // 锁定身份信息区域
    document.querySelectorAll('input[name="identity"]').forEach(el => el.disabled = true);
    document.getElementById('identitySelect').disabled = true;
    document.getElementById('principalWrap').classList.add('locked-section');
    document.getElementById('principalWrap').querySelectorAll('select').forEach(el => el.disabled = true);

    // 锁定上传框 - 使用CSS方式锁定，不使用disabled以便表单提交
    document.querySelectorAll('.file-upload-box, .upload-drop-zone').forEach(el => {
        el.classList.add('locked-upload');
        el.style.cursor = 'not-allowed';
        el.style.opacity = '0.6';
    });

    // 锁定投诉类型、功能模块、内容类型区域
    document.querySelectorAll('input[name="complaint_category"], input[name="complaint_type"]').forEach(el => el.disabled = true);
    document.querySelectorAll('input[name="module"]').forEach(el => el.disabled = true);
    document.querySelectorAll('input[name="content_type"]').forEach(el => el.disabled = true);
    document.querySelectorAll('textarea[name="description"]').forEach(el => el.disabled = true);

    // 文件上传input保持启用状态以便提交，但通过CSS pointer-events防止点击
    document.querySelectorAll('#excelFile, #proof_file_input, #other_proof_file_input').forEach(el => {
        el.style.pointerEvents = 'none';
        el.style.opacity = '0.5';
    });
}

// 单文件上传预览
function handleFileUpload(input, boxId, placeholderId, previewId, nonImgId, infoId) {
    const file = input.files[0];
    if (!file) return;
    const placeholder = document.getElementById(placeholderId);
    const preview = document.getElementById(previewId);
    const nonImg = document.getElementById(nonImgId);
    const info = document.getElementById(infoId);
    const imgExts = ['png','jpg','jpeg','bmp'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (imgExts.includes(ext)) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            nonImg.style.display = 'none';
            placeholder.style.display = 'none';
        };
        reader.readAsDataURL(file);
    } else {
        preview.style.display = 'none';
        nonImg.style.display = 'flex';
        nonImg.style.alignItems = 'center';
        nonImg.style.justifyContent = 'center';
        nonImg.textContent = file.name;
        placeholder.style.display = 'none';
    }
    if (info) info.textContent = '';
}

// 多文件上传（其他证明）
let otherProofFiles = [];

function handleMultiFileUpload(input) {
    const files = Array.from(input.files);
    files.forEach(file => {
        otherProofFiles.push(file);
        addOtherProofItem(file, otherProofFiles.length - 1);
    });
    input.value = '';
    syncOtherProofInput();
}

function addOtherProofItem(file, index) {
    const list = document.getElementById('otherProofList');
    const item = document.createElement('div');
    item.className = 'file-upload-box file-upload-box-sm other-proof-item';
    item.id = `otherItem_${index}`;
    const imgExts = ['png','jpg','jpeg','bmp'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (imgExts.includes(ext)) {
        const img = document.createElement('img');
        img.className = 'file-upload-preview';
        const reader = new FileReader();
        reader.onload = e => { img.src = e.target.result; };
        reader.readAsDataURL(file);
        item.appendChild(img);
    } else {
        const label = document.createElement('div');
        label.className = 'file-upload-nonimg';
        label.style.display = 'flex';
        label.style.alignItems = 'center';
        label.style.justifyContent = 'center';
        label.textContent = file.name;
        item.appendChild(label);
    }
    list.appendChild(item);
}

function syncOtherProofInput() {
    const dt = new DataTransfer();
    otherProofFiles.filter(Boolean).forEach(f => dt.items.add(f));
    document.getElementById('other_proof_file_input').files = dt.files;
    const names = otherProofFiles.filter(Boolean).map(f => f.name);
    document.getElementById('otherProofInfo').textContent = names.length ? `已选择：${names.join('、')}` : '';
}

// Excel 拖拽
const zone = document.getElementById('excelDropZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleExcelFile(file);
});

document.getElementById('excelFile').addEventListener('change', e => {
    if (e.target.files[0]) handleExcelFile(e.target.files[0]);
});

function handleExcelFile(file) {
    const info = document.getElementById('excelInfo');
    const err = document.getElementById('excelError');
    info.textContent = '';
    err.textContent = '';

    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx', 'xls'].includes(ext)) {
        err.textContent = '请上传 .xlsx 或 .xls 格式文件';
        return;
    }

    const formData = new FormData();
    formData.append('file', file);
    fetch('/api/check_excel', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                const batchCount = res.batch_count || 1;
                info.textContent = `已选择：${file.name}（共 ${res.rows} 行，将分 ${batchCount} 批提交）`;
                const dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById('excelFile').files = dt.files;
            } else {
                err.textContent = res.error;
                document.getElementById('excelFile').value = '';
            }
        })
        .catch(() => { info.textContent = `已选择：${file.name}`; });
}

const cookieTextarea = document.querySelector('textarea[name="cookie"]');
if (cookieTextarea) {
    cookieTextarea.addEventListener('blur', () => {
        cookieTextarea.value = cookieTextarea.value.trim();
    });
}

// 修改表单提交事件
document.getElementById('ucForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const accountValidation = validateAccountInfo();
    if (!accountValidation.isValid) {
        alert('请填写以下必填项：\n' + accountValidation.errorMessage);
        return;
    }

    // 如果有自定义模板的Excel数据，先创建Excel文件
    if (window.customTemplateExcelRows && window.customTemplateExcelRows.length > 0) {
        const excelData = window.customTemplateExcelRows.map(row => [
            row['侵权链接'],
            row['对应原创链接/对应访问码'],
            row['作品名称']
        ]);

        // 添加表头
        excelData.unshift(['侵权链接', '对应原创链接/对应访问码', '作品名称']);

        // 创建工作簿和工作表
        const ws = XLSX.utils.aoa_to_sheet(excelData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, '批量导入');

        // 转换为ArrayBuffer
        const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
        const blob = new Blob([wbout], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

        // 创建File对象并设置到excelFile输入框
        const excelFile = new File([blob], 'custom_template_batch.xlsx', { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        const dt = new DataTransfer();
        dt.items.add(excelFile);
        document.getElementById('excelFile').files = dt.files;
    }

    const formData = new FormData(this);
    const cookieValue = formData.get('cookie');
    if (typeof cookieValue === 'string') {
        formData.set('cookie', cookieValue.trim());
    }

    // 验证Cookie是否有效
    const cookieVerifyBtn = document.getElementById('submitBtn');
    const originalBtnText = cookieVerifyBtn ? cookieVerifyBtn.textContent : '提交投诉';
    if (cookieVerifyBtn) {
        cookieVerifyBtn.disabled = true;
        cookieVerifyBtn.textContent = '验证Cookie...';
    }

    try {
        const verifyResp = await fetch('/api/uc/verify_cookie', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({cookie: cookieValue})
        });
        const verifyResult = await verifyResp.json();

        if (!verifyResult.success) {
            alert('Cookie验证失败：' + verifyResult.error + '\n请重新填写Cookie后再次提交');
            if (cookieVerifyBtn) {
                cookieVerifyBtn.disabled = false;
                cookieVerifyBtn.textContent = originalBtnText;
            }
            return;
        }

        if (cookieVerifyBtn) {
            cookieVerifyBtn.textContent = '提交中...';
        }

        const response = await fetch('/api/uc/submit', {
            method: 'POST',
            body: formData
        });
        const result = await response.json();

        if (!response.ok || !result.success) {
            throw new Error(result.error || '提交失败');
        }

        alert(`提交成功\n任务编号：${result.task_id}\nExcel行数：${result.excel_rows}\n批次数：${result.batch_count}`);
        console.log('提交成功:', result);

        // 清空自定义模板数据
        window.customTemplateExcelRows = null;
    } catch (error) {
        alert(error.message || '提交失败');
        console.error('提交失败:', error);
    } finally {
        if (cookieVerifyBtn) {
            cookieVerifyBtn.disabled = false;
            cookieVerifyBtn.textContent = originalBtnText;
        }
    }
});

// 校验账号信息
function validateAccountInfo() {
    const collectAccount = document.querySelector('input[name="collect_account"]');
    const cookie = document.querySelector('textarea[name="cookie"]');
    const principal = document.querySelector('select[name="principal"]');
    const description = document.querySelector('textarea[name="description"]');
    const proofFile = document.getElementById('proof_file_input');
    const excelFile = document.getElementById('excelFile');
    const identity = document.querySelector('input[name="identity"]:checked')?.value;
    const isAgent = identity === '代理人';
    let isValid = true;
    let errorMessage = '';

    [collectAccount, cookie, principal, description].forEach(field => {
        if (field) {
            field.classList.remove('is-invalid');
            const feedback = field.parentNode.querySelector('.invalid-feedback');
            if (feedback) feedback.remove();
        }
    });

    const proofFileInfo = document.getElementById('proofFileInfo');
    const excelError = document.getElementById('excelError');
    if (excelError) {
        excelError.textContent = '';
    }

    const selectedIdentity = document.querySelector('input[name="identity"]:checked');
    if (!selectedIdentity) {
        isValid = false;
        errorMessage += '请选择您的身份\n';
    }

    const complaintCategory = document.querySelector('input[name="complaint_category"]:checked');
    if (!complaintCategory) {
        isValid = false;
        errorMessage += '请选择投诉大类\n';
    }

    const complaintType = document.querySelector('input[name="complaint_type"]:checked');
    if (!complaintType) {
        isValid = false;
        errorMessage += '请选择投诉类型\n';
    }

    const module = document.querySelector('input[name="module"]:checked');
    if (!module) {
        isValid = false;
        errorMessage += '请选择功能模块\n';
    }

    const contentType = document.querySelector('input[name="content_type"]:checked');
    if (!contentType) {
        isValid = false;
        errorMessage += '请选择内容类型\n';
    }

    if (!collectAccount || !collectAccount.value.trim()) {
        isValid = false;
        errorMessage += '请填写采集账号\n';
        if (collectAccount) {
            collectAccount.classList.add('is-invalid');
            if (!collectAccount.nextElementSibling || !collectAccount.nextElementSibling.classList.contains('invalid-feedback')) {
                const feedback = document.createElement('div');
                feedback.className = 'invalid-feedback';
                feedback.textContent = '采集账号不能为空';
                collectAccount.parentNode.appendChild(feedback);
            }
        }
    }

    if (!cookie || !cookie.value.trim()) {
        isValid = false;
        errorMessage += '请填写Cookie信息\n';
        if (cookie) {
            cookie.classList.add('is-invalid');
            if (!cookie.nextElementSibling || !cookie.nextElementSibling.classList.contains('invalid-feedback')) {
                const feedback = document.createElement('div');
                feedback.className = 'invalid-feedback';
                feedback.textContent = 'Cookie信息不能为空';
                cookie.parentNode.appendChild(feedback);
            }
        }
    }

    if (!description || !description.value.trim()) {
        isValid = false;
        errorMessage += '请填写投诉内容描述\n';
        if (description) {
            description.classList.add('is-invalid');
            if (!description.nextElementSibling || !description.nextElementSibling.classList.contains('invalid-feedback')) {
                const feedback = document.createElement('div');
                feedback.className = 'invalid-feedback';
                feedback.textContent = '投诉内容描述不能为空';
                description.parentNode.appendChild(feedback);
            }
        }
    }

    if (isAgent && (!principal || !principal.value.trim())) {
        isValid = false;
        errorMessage += '请选择被代理人（权利人）信息\n';
        if (principal) {
            principal.classList.add('is-invalid');
            if (!principal.nextElementSibling || !principal.nextElementSibling.classList.contains('invalid-feedback')) {
                const feedback = document.createElement('div');
                feedback.className = 'invalid-feedback';
                feedback.textContent = '被代理人不能为空';
                principal.parentNode.appendChild(feedback);
            }
        }
    }

    if (!proofFile || !proofFile.files || !proofFile.files.length) {
        isValid = false;
        errorMessage += '请上传证明文件\n';
        if (proofFileInfo) {
            proofFileInfo.textContent = '证明文件不能为空';
        }
    }

    if (!excelFile || (!excelFile.files || !excelFile.files.length) && (!window.customTemplateExcelRows || window.customTemplateExcelRows.length === 0)) {
        isValid = false;
        errorMessage += '请上传Excel批量导入文件\n';
        if (excelError) {
            excelError.textContent = 'Excel批量导入不能为空';
        }
    }

    return {
        isValid: isValid,
        errorMessage: errorMessage
    };
}

// 下载自定义模版
function downloadCustomTemplate() {
    window.location.href = '/api/download_custom_template';
}

// 处理自定义模版上传
let currentTemplateId = null;

function handleCustomTemplateUpload(input) {
    const file = input.files[0];
    if (!file) return;

    const formData = new FormData();
    formData.append('file', file);

    fetch('/api/upload_custom_template', {
        method: 'POST',
        body: formData
    })
    .then(r => r.json())
    .then(res => {
        if (res.success) {
            currentTemplateId = res.template_id;
            // 应用模板前先启用所有锁定字段
            enableLockedFields();
            applyCustomTemplateData(res);
            // 应用模板后锁定所有非账号信息字段
            lockAllFieldsExceptAccount();
            alert('自定义模版加载成功');
        } else {
            alert('加载失败：' + res.error);
            input.value = '';
        }
    })
    .catch(err => {
        alert('上传失败：' + err.message);
        input.value = '';
    });
}

// 从static/imgs目录获取证明文件
function fetchTemplateFileAsBlob(filename) {
    return fetch(`/api/proof_file/${encodeURIComponent(filename)}`)
        .then(res => {
            if (!res.ok) throw new Error('文件加载失败');
            return res.blob();
        })
        .then(blob => {
            // 从文件名获取类型
            const ext = filename.split('.').pop().toLowerCase();
            let mimeType = 'application/octet-stream';
            if (ext === 'jpg' || ext === 'jpeg') mimeType = 'image/jpeg';
            else if (ext === 'png') mimeType = 'image/png';
            else if (ext === 'pdf') mimeType = 'application/pdf';
            else if (ext === 'bmp') mimeType = 'image/bmp';
            return new File([blob], filename, { type: mimeType });
        });
}

// 应用自定义模版数据到表单
function applyCustomTemplateData(data) {
    const formData = data.form_data;
    const files = data.files;
    const excelRows = data.excel_rows;
    const templateId = data.template_id || currentTemplateId;

    // 1. 填充身份信息
    if (formData['您的身份']) {
        const identityRadios = document.querySelectorAll('input[name="identity"]');
        identityRadios.forEach(r => {
            r.checked = r.value === formData['您的身份'];
        });
        onIdentityChange();
    }

    // 2. 填充代理人/权利人
    if (formData['代理人/权利人']) {
        document.getElementById('identitySelect').value = formData['代理人/权利人'];
    }

    // 3. 填充被代理人
    if (formData['被代理人（权利人）信息']) {
        const principalSelect = document.querySelector('select[name="principal"]');
        if (principalSelect) {
            principalSelect.value = formData['被代理人（权利人）信息'];
        }
    }

    // 4. 填充投诉类型
    if (formData['投诉大类']) {
        const categoryRadios = document.querySelectorAll('input[name="complaint_category"]');
        categoryRadios.forEach(r => {
            r.checked = r.value === formData['投诉大类'];
        });
    }

    if (formData['投诉类型']) {
        const typeRadios = document.querySelectorAll('input[name="complaint_type"]');
        typeRadios.forEach(r => {
            r.checked = r.value === formData['投诉类型'];
        });
    }

    // 5. 填充功能模块
    if (formData['功能模块']) {
        const moduleRadios = document.querySelectorAll('input[name="module"]');
        moduleRadios.forEach(r => {
            r.checked = r.value === formData['功能模块'];
        });
    }

    // 6. 填充内容类型
    if (formData['内容类型']) {
        const contentTypeRadios = document.querySelectorAll('input[name="content_type"]');
        contentTypeRadios.forEach(r => {
            r.checked = r.value === formData['内容类型'];
        });
    }

    // 7. 填充投诉内容描述
    if (formData['投诉内容描述']) {
        const descTextarea = document.querySelector('textarea[name="description"]');
        if (descTextarea) {
            descTextarea.value = formData['投诉内容描述'];
        }
    }

    // 8. 处理证明材料文件
    if (files.proof_file) {
        fetchTemplateFileAsBlob(files.proof_file).then(blob => {
            const dt = new DataTransfer();
            dt.items.add(blob);
            document.getElementById('proof_file_input').files = dt.files;
            handleFileUpload(document.getElementById('proof_file_input'), 'proofFileBox', 'proofFilePlaceholder', 'proofFilePreview', 'proofFileNonImg', 'proofFileInfo');
        }).catch(() => {
            document.getElementById('proofFileInfo').textContent = '文件加载失败：' + files.proof_file;
        });
    }

    // 9. 处理其他证明文件
    otherProofFiles = [];
    document.getElementById('otherProofList').innerHTML = '';

    if (files.other_proof_files && files.other_proof_files.length > 0) {
        Promise.all(files.other_proof_files.map((filename, index) => {
            return fetchTemplateFileAsBlob(filename).then(blob => {
                otherProofFiles.push(blob);
                addOtherProofItem(blob, otherProofFiles.length - 1);
            }).catch(() => {
                console.error('文件加载失败：' + filename);
            });
        })).then(() => {
            syncOtherProofInput();
        });
    }

    // 10. 处理批量导入Excel - 保存excel数据用于后续提交
    if (excelRows && excelRows.length > 0) {
        // 将excel数据存储在表单上用于后续提交
        window.customTemplateExcelRows = excelRows;
        const excelInfo = document.getElementById('excelInfo');
        excelInfo.textContent = `已选择：自定义模板投诉内容（共 ${excelRows.length} 行）`;
    }
}
