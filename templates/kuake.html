<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>夸克投诉表单</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<header class="main-header shadow-sm">
    <div class="logo-area"><i class="fas fa-search"></i> 夸克投诉</div>
    <div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</header>

<div class="form-page-wrap">

    <!-- 投诉模版 -->
    <div class="form-card mb-4">
        <div class="section-title"><i class="fas fa-clone"></i> 投诉模版</div>
    </div>

    <form id="kuakeForm" enctype="multipart/form-data">

        <!-- 身份信息 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-user"></i> 身份信息</div>
            <div class="mb-3">
                <label class="form-label">您的身份</label>
                <div class="d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="identity" id="id_rightsholder" value="权利人" onchange="onIdentityChange()">
                        <label class="form-check-label" for="id_rightsholder">权利人</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="identity" id="id_agent" value="代理人" checked onchange="onIdentityChange()">
                        <label class="form-check-label" for="id_agent">代理人</label>
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <select class="form-select" name="agent" id="identitySelect" required>
                    <option value="北京和晞科技有限公司">北京和晞科技有限公司</option>
                </select>
            </div>
            <div id="principalWrap">
                <div class="mb-3">
                    <label class="form-label">被代理人（权利人）信息</label>
                    <select class="form-select" name="principal" required>
                        <option value="">请选择被代理人</option>
                        <option>北京腾讯</option>
                        <option>深圳腾讯</option>
                        <option>腾讯企鹅</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">委托代理文件</label>
                    <div class="file-upload-box" id="proxyFileBox" onclick="document.getElementById('proxy_file_input').click()">
                        <div class="file-upload-placeholder" id="proxyFilePlaceholder">
                            <i class="fas fa-plus fa-lg"></i>
                            <div class="mt-1" style="font-size:12px">点击上传</div>
                        </div>
                        <img id="proxyFilePreview" class="file-upload-preview" style="display:none">
                        <div id="proxyFileNonImg" class="file-upload-nonimg" style="display:none"></div>
                    </div>
                    <input type="file" id="proxy_file_input" name="proxy_file" accept=".png,.jpg,.jpeg,.bmp,.pdf,.xlsx" style="display:none" onchange="handleFileUpload(this,'proxyFileBox','proxyFilePlaceholder','proxyFilePreview','proxyFileNonImg','proxyFileInfo')">
                    <div class="file-info" id="proxyFileInfo"></div>
                </div>
            </div>
        </div>

        <!-- 投诉类型 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-tag"></i> 投诉类型</div>
            <div class="mb-3">
                <div class="d-flex gap-4">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="complaint_category" id="cat_ip" value="知识产权" checked>
                        <label class="form-check-label" for="cat_ip">知识产权</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="complaint_category" id="cat_personal" value="人身权">
                        <label class="form-check-label" for="cat_personal">人身权</label>
                    </div>
                </div>
            </div>
            <div class="d-flex flex-wrap gap-3">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_copyright" value="著作权（含视频、图文、图集等）" checked>
                    <label class="form-check-label" for="type_copyright">著作权（含视频、图文、图集等）</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_trademark" value="商标">
                    <label class="form-check-label" for="type_trademark">商标</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_patent" value="专利">
                    <label class="form-check-label" for="type_patent">专利</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="complaint_type" id="type_other_ip" value="其他知识产权">
                    <label class="form-check-label" for="type_other_ip">其他知识产权</label>
                </div>
            </div>
        </div>

        <!-- 功能模块 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-th-large"></i> 功能模块</div>
            <div class="d-flex flex-wrap gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_pan" value="夸克网盘" checked>
                    <label class="form-check-label" for="mod_pan">夸克网盘</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_img" value="夸克图片">
                    <label class="form-check-label" for="mod_img">夸克图片</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_news" value="夸克日报">
                    <label class="form-check-label" for="mod_news">夸克日报</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="module" id="mod_search" value="夸克搜索">
                    <label class="form-check-label" for="mod_search">夸克搜索</label>
                </div>
            </div>
        </div>

        <!-- 内容类型 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-film"></i> 内容类型</div>
            <div class="d-flex flex-wrap gap-4">
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_drama" value="影视剧集" checked>
                    <label class="form-check-label" for="ct_drama">影视剧集</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_video" value="其他视频">
                    <label class="form-check-label" for="ct_video">其他视频</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_novel" value="小说">
                    <label class="form-check-label" for="ct_novel">小说</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_comic" value="漫画">
                    <label class="form-check-label" for="ct_comic">漫画</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_image" value="图片">
                    <label class="form-check-label" for="ct_image">图片</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_article" value="文章">
                    <label class="form-check-label" for="ct_article">文章</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_software" value="软件/游戏">
                    <label class="form-check-label" for="ct_software">软件/游戏</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="content_type" id="ct_other" value="其他">
                    <label class="form-check-label" for="ct_other">其他</label>
                </div>
            </div>
        </div>

        <!-- 投诉内容 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-file-import"></i> 投诉内容</div>
            <div class="mb-3">
                <label class="form-label">批量导入（Excel，最多200行）</label>
                <div class="upload-drop-zone" id="excelDropZone" onclick="document.getElementById('excelFile').click()">
                    <i class="fas fa-file-excel fa-2x mb-2" style="color:#bcaaa4"></i>
                    <div>点击或拖拽上传 Excel 文件</div>
                    <div style="font-size:11px;color:#bbb">支持 .xlsx .xls</div>
                </div>
                <input type="file" id="excelFile" name="excel_file" accept=".xlsx,.xls" style="display:none">
                <div id="excelInfo" class="file-info"></div>
                <div id="excelError" class="file-error"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">投诉内容描述</label>
                <textarea class="form-control" name="description" rows="4" placeholder="请填写投诉内容描述..."></textarea>
            </div>
        </div>

        <!-- 证明材料 -->
        <div class="form-card">
            <div class="section-title"><i class="fas fa-paperclip"></i> 证明材料</div>
            <div class="mb-3">
                <label class="form-label">证明材料</label>
                <div class="file-upload-box" id="proofFileBox" onclick="document.getElementById('proof_file_input').click()">
                    <div class="file-upload-placeholder" id="proofFilePlaceholder">
                        <i class="fas fa-plus fa-lg"></i>
                        <div class="mt-1" style="font-size:12px">点击上传</div>
                    </div>
                    <img id="proofFilePreview" class="file-upload-preview" style="display:none">
                    <div id="proofFileNonImg" class="file-upload-nonimg" style="display:none"></div>
                </div>
                <input type="file" id="proof_file_input" name="proof_file" accept=".png,.jpg,.jpeg,.bmp,.pdf,.xlsx" style="display:none" onchange="handleFileUpload(this,'proofFileBox','proofFilePlaceholder','proofFilePreview','proofFileNonImg','proofFileInfo')">
                <div class="file-info" id="proofFileInfo"></div>
                <div class="form-text">支持 .png .jpg .jpeg .bmp .pdf .xlsx</div>
            </div>
            <div class="mb-3">
                <label class="form-label">其他证明</label>
                <div class="d-flex flex-wrap gap-2" id="otherProofList"></div>
                <div class="file-upload-box file-upload-box-sm mt-2" id="otherProofAddBtn" onclick="document.getElementById('other_proof_file_input').click()">
                    <div class="file-upload-placeholder">
                        <i class="fas fa-plus fa-lg"></i>
                        <div class="mt-1" style="font-size:12px">点击上传</div>
                    </div>
                </div>
                <input type="file" id="other_proof_file_input" name="other_proof_file" accept=".png,.jpg,.jpeg,.bmp,.pdf,.xlsx" multiple style="display:none" onchange="handleMultiFileUpload(this)">
                <div class="file-info" id="otherProofInfo"></div>
                <div class="form-text">支持 .png .jpg .jpeg .bmp .pdf .xlsx</div>
            </div>
        </div>

        <div class="text-center">
            <button type="submit" class="btn btn-brown px-5">提交投诉</button>
        </div>

    </form>
</div>

<script>
// 身份切换
function onIdentityChange() {
    const isAgent = document.getElementById('id_agent').checked;
    const select = document.getElementById('identitySelect');
    const principalWrap = document.getElementById('principalWrap');

    select.innerHTML = isAgent
        ? '<option value="北京和晞科技有限公司">北京和晞科技有限公司</option>'
        : '<option value="刘明">刘明</option>';

    principalWrap.style.display = isAgent ? 'block' : 'none';
}

// 单文件上传预览
function handleFileUpload(input, boxId, placeholderId, previewId, nonImgId, infoId) {
    const file = input.files[0];
    if (!file) return;
    const placeholder = document.getElementById(placeholderId);
    const preview = document.getElementById(previewId);
    const nonImg = document.getElementById(nonImgId);
    const info = document.getElementById(infoId);
    const imgExts = ['png','jpg','jpeg','bmp'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (imgExts.includes(ext)) {
        const reader = new FileReader();
        reader.onload = e => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            nonImg.style.display = 'none';
            placeholder.style.display = 'none';
        };
        reader.readAsDataURL(file);
    } else {
        preview.style.display = 'none';
        nonImg.style.display = 'flex';
        nonImg.style.alignItems = 'center';
        nonImg.style.justifyContent = 'center';
        nonImg.textContent = file.name;
        placeholder.style.display = 'none';
    }
    if (info) info.textContent = '';
}

// 多文件上传（其他证明）
let otherProofFiles = [];

function handleMultiFileUpload(input) {
    const files = Array.from(input.files);
    files.forEach(file => {
        otherProofFiles.push(file);
        addOtherProofItem(file, otherProofFiles.length - 1);
    });
    input.value = '';
    syncOtherProofInput();
}

function addOtherProofItem(file, index) {
    const list = document.getElementById('otherProofList');
    const item = document.createElement('div');
    item.className = 'file-upload-box file-upload-box-sm other-proof-item';
    item.id = `otherItem_${index}`;
    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.innerHTML = '&times;';
    removeBtn.onclick = e => { e.stopPropagation(); removeOtherProof(index); };
    item.appendChild(removeBtn);
    const imgExts = ['png','jpg','jpeg','bmp'];
    const ext = file.name.split('.').pop().toLowerCase();
    if (imgExts.includes(ext)) {
        const img = document.createElement('img');
        img.className = 'file-upload-preview';
        const reader = new FileReader();
        reader.onload = e => { img.src = e.target.result; };
        reader.readAsDataURL(file);
        item.appendChild(img);
        item.onclick = () => document.getElementById('other_proof_file_input').click();
    } else {
        const label = document.createElement('div');
        label.className = 'file-upload-nonimg';
        label.style.display = 'flex';
        label.style.alignItems = 'center';
        label.style.justifyContent = 'center';
        label.textContent = file.name;
        item.appendChild(label);
    }
    list.appendChild(item);
}

function removeOtherProof(index) {
    otherProofFiles[index] = null;
    const el = document.getElementById(`otherItem_${index}`);
    if (el) el.remove();
    syncOtherProofInput();
}

function syncOtherProofInput() {
    const dt = new DataTransfer();
    otherProofFiles.filter(Boolean).forEach(f => dt.items.add(f));
    document.getElementById('other_proof_file_input').files = dt.files;
    const names = otherProofFiles.filter(Boolean).map(f => f.name);
    document.getElementById('otherProofInfo').textContent = names.length ? `已选择：${names.join('、')}` : '';
}

// Excel 拖拽
const zone = document.getElementById('excelDropZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) handleExcelFile(file);
});

document.getElementById('excelFile').addEventListener('change', e => {
    if (e.target.files[0]) handleExcelFile(e.target.files[0]);
});

function handleExcelFile(file) {
    const info = document.getElementById('excelInfo');
    const err = document.getElementById('excelError');
    info.textContent = '';
    err.textContent = '';

    const ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx', 'xls'].includes(ext)) {
        err.textContent = '请上传 .xlsx 或 .xls 格式文件';
        return;
    }

    // 用服务端校验行数，这里先显示文件名
    const formData = new FormData();
    formData.append('file', file);
    fetch('/api/check_excel', { method: 'POST', body: formData })
        .then(r => r.json())
        .then(res => {
            if (res.success) {
                info.textContent = `已选择：${file.name}（共 ${res.rows} 行）`;
                // 把文件塞回 input
                const dt = new DataTransfer();
                dt.items.add(file);
                document.getElementById('excelFile').files = dt.files;
            } else {
                err.textContent = res.error;
                document.getElementById('excelFile').value = '';
            }
        })
        .catch(() => { info.textContent = `已选择：${file.name}`; });
}
</script>
</body>
</html>
