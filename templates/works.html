<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>作品覆盖列表</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/fuse.js/7.0.0/fuse.min.js"></script>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</head>
<body>
<header class="main-header shadow-sm">
    <div class="logo-area"><i class="fas fa-images"></i> 作品覆盖列表</div>
    <div>
        <a href="/" class="back-btn"><i class="fas fa-arrow-left"></i> 返回首页</a>
    </div>
</header>

<div class="form-page-wrap">
    <div class="form-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="section-title mb-0"><i class="fas fa-images"></i> 作品覆盖列表</div>
            <button class="btn btn-primary" onclick="openAddWorkModal()">
                <i class="fas fa-plus"></i> 新增作品
            </button>
        </div>
        <div class="mb-3">
            <input type="text" id="searchInput" class="form-control" placeholder="输入剧名、代理主体(司内)、被代理人信息、内容类型或投诉类型进行搜索..." autocomplete="off">
        </div>
        <div id="resultCount" class="form-text mb-3"></div>
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="worksTable">
                <thead>
                    <tr>
                        <th>剧名</th>
                        <th>代理主体(司内)</th>
                        <th>被代理人信息</th>
                        <th>内容类型</th>
                        <th>投诉类型</th>
                        <th>作品权属文件</th>
                        <th>其他证明</th>
                    </tr>
                </thead>
                <tbody id="worksTableBody">
                    <tr><td colspan="7" class="text-center text-muted py-4">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        <div id="emptyState" class="text-center text-muted py-5" style="display:none">
            <i class="fas fa-folder-open fa-3x mb-3"></i>
            <div>暂无作品</div>
        </div>
        <div id="searchEmpty" class="text-center text-muted py-5" style="display:none">
            <i class="fas fa-search fa-3x mb-3"></i>
            <div>未找到匹配的作品</div>
        </div>

        <div id="copyTooltip" class="copy-tooltip">复制成功</div>
    </div>
</div>

<!-- 其他证明弹窗 -->
<div class="modal fade" id="otherProofModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title"><i class="fas fa-paperclip me-2"></i><span id="otherProofModalTitle">其他证明</span></div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div id="otherProofModalBody"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- 新增作品弹窗 -->
<div class="modal fade" id="addWorkModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title"><i class="fas fa-plus me-2"></i>新增作品</div>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">请输入剧名</label>
                    <input type="text" class="form-control" id="inputWorkName" placeholder="请输入剧名" onblur="this.value = this.value.trim(); checkWorkNameDuplicate(this.value)">
                    <div class="invalid-feedback d-block" id="workNameError" style="display:none !important;"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">代理主体(司内)</label>
                    <select class="form-select" id="inputUsedCompany" onchange="loadPrincipalOptionsForWork()">
                        <option value="和晞科技">和晞科技</option>
                        <option value="柏蒙文化">柏蒙文化</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">被代理人信息</label>
                    <select class="form-select" id="inputPrincipalName">
                        <option value="">请先选择被代理人信息</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">内容类型</label>
                    <select class="form-select" id="inputContentType">
                        <option value="">请选择内容类型</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">投诉类型</label>
                    <select class="form-select" id="inputComplaintType">
                        <option value="">请选择投诉类型</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">请上传作品权属（此处上传的文件用于投诉时的证明文件） </label>
                    <input type="file" class="form-control" id="inputProofFile" accept=".png,.jpg,.jpeg,.bmp,.pdf">
                    <div class="form-text">上传文件原始名称需以：证明文件_作品名称 开头，例如：证明文件_铳火.png、证明文件_铳火_file.jpg</div>
                    <div class="invalid-feedback d-block" id="proofFileNameError" style="display:none !important;"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">是否还有其他证明文件（最多2个，此处上传的文件用于投诉时的其他证明，除两执照一委托外）</label>
                    <input type="file" class="form-control" id="inputOtherProofFiles" accept=".png,.jpg,.jpeg,.bmp,.pdf" multiple>
                    <div class="form-text">上传文件原始名称需符合：其他证明_作品名称_序号.xxx，例如：其他证明_铳火_1.png</div>
                    <div class="invalid-feedback d-block" id="otherProofFilesNameError" style="display:none !important;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="submitAddWork()">提交</button>
            </div>
        </div>
    </div>
</div>

<style>
.works-grid {
    display: none;
}
.table td, .table th {
    white-space: nowrap;
    vertical-align: middle;
}
.copy-tooltip {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #198754;
    color: #fff;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}
.copy-tooltip.show {
    opacity: 1;
}
</style>

<script>
let allWorks = [];
let fuse = null;
let debounceTimer = null;
let addWorkModal = null;
let otherProofModal = null;

function normalizeWorkFilenamePart(value) {
    return (value || '').trim().replace(/（/g, '(').replace(/）/g, ')');
}

function showWorkFileNameError(inputId, errorId, message) {
    const input = document.getElementById(inputId);
    const errorEl = document.getElementById(errorId);
    if (input) input.classList.add('is-invalid');
    if (errorEl) {
        errorEl.textContent = message;
        errorEl.style.display = 'block';
    }
}

function clearWorkFileNameError(inputId, errorId) {
    const input = document.getElementById(inputId);
    const errorEl = document.getElementById(errorId);
    if (input) input.classList.remove('is-invalid');
    if (errorEl) {
        errorEl.textContent = '';
        errorEl.style.display = 'none';
    }
}

function validateWorkAssetFilenames(workName, proofFile, otherFiles) {
    const normalizedWorkName = normalizeWorkFilenamePart(workName);
    if (proofFile) {
        const dot = proofFile.name.lastIndexOf('.');
        const stem = normalizeWorkFilenamePart(dot >= 0 ? proofFile.name.slice(0, dot) : proofFile.name);
        const expectedPrefix = `证明文件_${normalizedWorkName}`;
        if (!stem.startsWith(expectedPrefix)) {
            return `作品权属文件名不符合要求，请上传以“${expectedPrefix}”开头的文件`;
        }
    }

    for (const file of (otherFiles || [])) {
        const dot = file.name.lastIndexOf('.');
        const stem = normalizeWorkFilenamePart(dot >= 0 ? file.name.slice(0, dot) : file.name);
        const pattern = new RegExp(`^其他证明_${normalizedWorkName}_[0-9]+$`);
        if (!pattern.test(stem)) {
            return `其他证明文件名不符合要求，请上传命名为“其他证明_${normalizedWorkName}_序号.文件后缀”的文件`;
        }
    }

    return '';
}

function validateWorkNameFormat(workName) {
    if (!workName) return '';
    const trimmed = workName.trim();
    if (!trimmed) return '';
    if (/\s/.test(trimmed)) {
        return '剧名中间不允许有空格';
    }
    return '';
}

function checkWorkNameDuplicate(workName) {
    if (!workName) return;
    const exists = allWorks.some(item => item.work_name === workName);
    if (exists) {
        showDuplicateWarning('该作品名称已在作品覆盖列表里面存在，请确认是否需要再次新增');
    }
}

function showDuplicateWarning(msg) {
    let el = document.getElementById('workNameDuplicateWarning');
    if (!el) {
        el = document.createElement('div');
        el.id = 'workNameDuplicateWarning';
        el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#fff3cd;color:#856404;border:1px solid #ffc107;padding:10px 24px;border-radius:6px;font-size:14px;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,0.15);transition:opacity 0.3s;';
        document.body.appendChild(el);
    }
    el.textContent = msg;
    el.style.opacity = '1';
    el.style.display = 'block';
    setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => { el.style.display = 'none'; }, 300);
    }, 5000);
}

function validateWorkNameImmediately() {
    const input = document.getElementById('inputWorkName');
    const workName = input.value.trim();
    clearWorkFileNameError('inputWorkName', 'workNameError');
    if (!workName) return true;
    const msg = validateWorkNameFormat(workName);
    if (msg) {
        showWorkFileNameError('inputWorkName', 'workNameError', msg);
        return false;
    }
    return true;
}

function validateProofFileImmediately() {
    const workName = document.getElementById('inputWorkName').value.trim();
    const proofFile = document.getElementById('inputProofFile').files[0];
    clearWorkFileNameError('inputProofFile', 'proofFileNameError');
    if (!proofFile || !workName) return true;
    const msg = validateWorkAssetFilenames(workName, proofFile, []);
    if (msg) {
        showWorkFileNameError('inputProofFile', 'proofFileNameError', msg);
        return false;
    }
    return true;
}

function validateOtherProofFilesImmediately() {
    const workName = document.getElementById('inputWorkName').value.trim();
    const otherFiles = Array.from(document.getElementById('inputOtherProofFiles').files || []);
    clearWorkFileNameError('inputOtherProofFiles', 'otherProofFilesNameError');
    if (!otherFiles.length || !workName) return true;
    const msg = validateWorkAssetFilenames(workName, null, otherFiles);
    if (msg) {
        showWorkFileNameError('inputOtherProofFiles', 'otherProofFilesNameError', msg);
        return false;
    }
    return true;
}

function buildWorkDirName(item) {
    return `${item.work_name}_${item.used_company}_${item.content_type}_${item.complaint_type}`;
}

function buildWorkAssetUrl(item, fileName) {
    return `/api/proof_file/${encodeURIComponent(`剧名/${buildWorkDirName(item)}/${fileName}`)}`;
}

function openOtherProofModal(workId) {
    const item = allWorks.find(w => String(w.id) === String(workId));
    if (!item) return;

    document.getElementById('otherProofModalTitle').textContent = `其他证明 - ${item.work_name}`;
    const body = document.getElementById('otherProofModalBody');
    const files = item.other_proof_files || [];

    if (files.length === 0) {
        body.innerHTML = '<div class="text-muted">暂无其他证明文件</div>';
    } else {
        body.innerHTML = files.map((file, index) => `
            <div class="d-flex justify-content-between align-items-center border rounded px-3 py-2 mb-2">
                <div><i class="fas fa-file me-2 text-primary"></i>${escapeHtml(file)}</div>
                <a href="${buildWorkAssetUrl(item, file)}" target="_blank" class="btn btn-sm btn-outline-primary">打开</a>
            </div>
        `).join('');
    }

    otherProofModal.show();
}

async function loadWorkDictionaries() {
    const [contentRes, complaintRes] = await Promise.all([
        fetch('/api/works/content_types').then(r => r.json()),
        fetch('/api/works/complaint_types').then(r => r.json())
    ]);
    const contentSelect = document.getElementById('inputContentType');
    const complaintSelect = document.getElementById('inputComplaintType');
    if (contentRes.success) {
        contentRes.data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.textContent = item.name;
            contentSelect.appendChild(opt);
        });
    }
    if (complaintRes.success) {
        complaintRes.data.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.id;
            opt.textContent = item.name;
            complaintSelect.appendChild(opt);
        });
    }
}

async function loadPrincipalOptionsForWork() {
    const usedCompany = document.getElementById('inputUsedCompany').value;
    const principalSelect = document.getElementById('inputPrincipalName');
    principalSelect.innerHTML = '<option value="">请先选择被代理人信息</option>';
    if (!usedCompany) return;
    const res = await fetch(`/api/works/principal_options?used_company=${encodeURIComponent(usedCompany)}`);
    const data = await res.json();
    if (!data.success) return;
    data.data.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        opt.textContent = name;
        principalSelect.appendChild(opt);
    });
}

async function loadWorks() {
    const res = await fetch('/api/works/list');
    const data = await res.json();
    if (!data.success) {
        document.getElementById('worksTableBody').innerHTML = '<tr><td colspan="7" class="text-danger text-center py-4">加载失败</td></tr>';
        return;
    }
    allWorks = data.data;
    fuse = new Fuse(allWorks, {
        threshold: 0.3,
        ignoreLocation: true,
        keys: ['work_name', 'used_company', 'principal_name', 'content_type', 'complaint_type']
    });
    renderWorks(allWorks);
}

function renderWorks(works) {
    const tbody = document.getElementById('worksTableBody');
    const table = document.getElementById('worksTable');
    const emptyState = document.getElementById('emptyState');
    const searchEmpty = document.getElementById('searchEmpty');
    const countEl = document.getElementById('resultCount');
    const searchValue = document.getElementById('searchInput').value.trim();

    tbody.innerHTML = '';
    if (works.length === 0) {
        table.style.display = 'none';
        emptyState.style.display = searchValue ? 'none' : 'flex';
        searchEmpty.style.display = searchValue ? 'flex' : 'none';
        countEl.textContent = '';
        return;
    }

    table.style.display = '';
    emptyState.style.display = 'none';
    searchEmpty.style.display = 'none';
    countEl.textContent = `共 ${works.length} 个作品`;

    works.forEach(item => {
        const tr = document.createElement('tr');
        const proofCell = item.proof_file
            ? `<a href="${buildWorkAssetUrl(item, item.proof_file)}" target="_blank"><i class="fas fa-file-alt me-1"></i>${escapeHtml(item.proof_file)}</a>`
            : '-';
        const otherCount = item.other_proof_count ?? (item.other_proof_files || []).length;
        const otherCell = otherCount > 0
            ? `<button type="button" class="btn btn-sm btn-outline-primary" onclick="openOtherProofModal('${item.id}')"><i class="fas fa-eye me-1"></i>查看(${otherCount})</button>`
            : '0';
        tr.innerHTML = `
            <td>${escapeHtml(item.work_name)}</td>
            <td>${escapeHtml(item.used_company)}</td>
            <td>${escapeHtml(item.principal_name || '-')}</td>
            <td>${escapeHtml(item.content_type)}</td>
            <td>${escapeHtml(item.complaint_type)}</td>
            <td>${proofCell}</td>
            <td>${otherCell}</td>
        `;
        tbody.appendChild(tr);
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function openAddWorkModal() {
    document.getElementById('inputWorkName').value = '';
    document.getElementById('inputUsedCompany').value = '和晞科技';
    document.getElementById('inputPrincipalName').innerHTML = '<option value="">请先选择被代理人信息</option>';
    document.getElementById('inputContentType').value = '';
    document.getElementById('inputComplaintType').value = '';
    document.getElementById('inputProofFile').value = '';
    document.getElementById('inputOtherProofFiles').value = '';
    clearWorkFileNameError('inputWorkName', 'workNameError');
    clearWorkFileNameError('inputProofFile', 'proofFileNameError');
    clearWorkFileNameError('inputOtherProofFiles', 'otherProofFilesNameError');
    loadPrincipalOptionsForWork();
    addWorkModal.show();
}

async function submitAddWork() {
    const workName = document.getElementById('inputWorkName').value.trim();
    const usedCompany = document.getElementById('inputUsedCompany').value;
    const principalName = document.getElementById('inputPrincipalName').value.trim();
    const contentTypeId = document.getElementById('inputContentType').value;
    const complaintTypeId = document.getElementById('inputComplaintType').value;
    const proofFile = document.getElementById('inputProofFile').files[0];
    const otherFiles = Array.from(document.getElementById('inputOtherProofFiles').files || []);

    if (!workName || !usedCompany || !principalName || !contentTypeId || !complaintTypeId || !proofFile) {
        alert('请填写所有必填项并上传作品权属文件');
        return;
    }
    if (otherFiles.length > 2) {
        alert('其他证明文件最多上传2个');
        return;
    }
    if (!validateWorkNameImmediately()) {
        return;
    }
    if (!validateProofFileImmediately() || !validateOtherProofFilesImmediately()) {
        return;
    }

    const formData = new FormData();
    formData.append('work_name', workName);
    formData.append('used_company', usedCompany);
    formData.append('principal_name', principalName);
    formData.append('content_type_id', contentTypeId);
    formData.append('complaint_type_id', complaintTypeId);
    formData.append('proof_file', proofFile);
    otherFiles.forEach(file => formData.append('other_proof_file', file));

    const res = await fetch('/api/works/add', { method: 'POST', body: formData });
    const data = await res.json();
    if (!data.success) {
        alert('新增失败：' + data.error);
        return;
    }
    addWorkModal.hide();
    await loadWorks();
}

document.getElementById('searchInput').addEventListener('input', function(e) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => {
        const keyword = e.target.value.trim();
        if (!keyword) {
            renderWorks(allWorks);
            return;
        }
        const results = fuse.search(keyword).map(r => r.item);
        renderWorks(results);
    }, 300);
});

document.addEventListener('DOMContentLoaded', () => {
    addWorkModal = new bootstrap.Modal(document.getElementById('addWorkModal'));
    otherProofModal = new bootstrap.Modal(document.getElementById('otherProofModal'));
    loadWorkDictionaries();
    loadPrincipalOptionsForWork();
    loadWorks();

    document.getElementById('inputProofFile').addEventListener('change', validateProofFileImmediately);
    document.getElementById('inputOtherProofFiles').addEventListener('change', validateOtherProofFilesImmediately);
    document.getElementById('inputWorkName').addEventListener('blur', () => {
        validateWorkNameImmediately();
        validateProofFileImmediately();
        validateOtherProofFilesImmediately();
    });
});
</script>
</body>
</html>
