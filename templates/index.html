<body>

        <a href="https://alidocs.dingtalk.com/i/nodes/P7QG4Yx2JpoQ5lRRigZ6vNeZV9dEq3XD" target="_blank" class="back-btn" style="margin-left:8px"><i class="fas fa-book"></i> 使用指南</a>

<div class="home-wrap">
    <div class="row g-4 main-content">
        <!-- 左侧：投诉平台 -->
        <div class="col-md-5 left-panel">
            <div class="section-title mb-3"><i class="fas fa-file-alt"></i> 投诉平台</div>
            <div class="d-flex flex-column gap-3">
                <a href="/uc" class="platform-card shadow-sm">
                    <div class="icon"><i class="fas fa-globe"></i></div>
                    <div class="name">UC投诉</div>
                    <div class="desc">UC平台投诉表单</div>
                </a>
                <a href="/baidu" class="platform-card shadow-sm">
                    <div class="icon"><i class="fas fa-cloud"></i></div>
                    <div class="name">百度投诉</div>
                    <div class="desc">百度网盘/搜索版权投诉</div>
                </a>

                <!-- UC状态查询 -->

                    <div class="status-card-header">
                        <div class="icon"><i class="fas fa-globe"></i></div>
                        <div class="name">UC状态查询</div>

                        </button>
                    </div>
                    <div class="status-card-body">
                        <div id="ucStatusTable" class="status-table-wrap">
                            <div class="status-loading">

                            </div>
                        </div>
                    </div>
                </div>

                <!-- 百度状态查询 -->
                <div class="status-card shadow-sm">
                    <div class="status-card-header">
                        <div class="icon"><i class="fas fa-cloud"></i></div>
                        <div class="name">百度状态查询</div>
                        <button class="btn btn-sm btn-outline-primary ms-auto" onclick="refreshBaiduStatus()">
                            <i class="fas fa-sync-alt"></i> 刷新
                        </button>
                    </div>

                        <div id="baiduStatusTable" class="status-table-wrap">
                            <div class="status-loading">

                            </div>
                        </div>
                    </div>
                </div>

                <!-- 夸克状态查询 -->
                <div class="status-card shadow-sm">
                    <div class="status-card-header">
                        <div class="icon"><i class="fas fa-search"></i></div>
                        <div class="name">夸克状态查询</div>
                    </div>
                    <div class="status-card-body">
                        <div class="status-empty">
                            <i class="fas fa-inbox fa-2x mb-2"></i>

</div>

<div class="modal fade" id="authorizationExpiryModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title"><i class="fas fa-exclamation-circle me-2 text-warning"></i>授权委托书到期提醒</div>
            </div>
            <div class="modal-body">
                <div id="authorizationExpiryAlertList" class="d-flex flex-column gap-2"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" data-bs-dismiss="modal">确认</button>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script>

// 全局队列数据，用于跨平台计算预估完成时间
let globalQueue = [];
let authorizationExpiryModal = null;
const authorizationExpiryLoginMarker = {{ login_time_marker | tojson }};

function getEstimatedTime(taskId) {
    if (!globalQueue.length) return '-';
    const idx = globalQueue.findIndex(q => q.task_id === taskId);
    if (idx === -1) return '-';

    // 计算该任务前面所有任务的累计耗时 + 自己的耗时
    let cumulativeSeconds = 0;
    for (let i = 0; i <= idx; i++) {
        const q = globalQueue[i];
        // 每批次预估耗时：百度 20 秒；UC 按每批 2 分钟（120 秒）估算
        const secPerBatch = q.platform_code === 'baidu' ? 20 : 120;
        cumulativeSeconds += (q.batch_count || 1) * secPerBatch;
    }

    // 基准时间：第一个任务的提交时间
    const firstSubmit = globalQueue[0].submitted_at;
    if (!firstSubmit) return '-';
    const baseTime = new Date(firstSubmit);
    const estTime = new Date(baseTime.getTime() + cumulativeSeconds * 1000);
    const pad = n => String(n).padStart(2, '0');
    return `${pad(estTime.getHours())}:${pad(estTime.getMinutes())}`;
}

async function loadGlobalQueue() {
    try {
        const resp = await fetch('/api/worker/queue_status');
        const data = await resp.json();
        if (data.success) {
            globalQueue = data.queue || [];
        }
    } catch (e) {
        globalQueue = [];
    }
}

function getAuthorizationExpiryStorageKey() {
    return authorizationExpiryLoginMarker ? `authorization-expiry-alert-shown:${authorizationExpiryLoginMarker}` : '';
}

async function checkAuthorizationExpiryAlertsOnce() {
    const storageKey = getAuthorizationExpiryStorageKey();
    if (!storageKey || localStorage.getItem(storageKey) === '1') {
        return;
    }

    try {
        const resp = await fetch('/api/principals/authorization_alerts');
        const data = await resp.json();
        if (!data.success) {
            return;
        }

        localStorage.setItem(storageKey, '1');

        if (!data.data || data.data.length === 0) {
            return;
        }

        const list = document.getElementById('authorizationExpiryAlertList');
        list.innerHTML = data.data.map(item => `
            <div class="alert alert-warning mb-0 py-2 px-3">${item.message}</div>
        `).join('');
        authorizationExpiryModal.show();
    } catch (e) {
        console.error('加载授权委托书到期提醒失败', e);
    }
}

function refreshUcStatus() {
    const container = document.getElementById('ucStatusTable');
    const cardHeader = container.closest('.status-card').querySelector('.status-card-header');
    const refreshBtn = cardHeader ? cardHeader.querySelector('button') : null;

    container.innerHTML = '<div class="status-loading"><i class="fas fa-spinner fa-spin"></i> 刷新中...</div>';
    if (refreshBtn) refreshBtn.disabled = true;

    fetch('/api/uc/status_list')
        .then(res => res.json())
        .then(data => {
            if (data.success && data.data.length > 0) {
                let html = `
                    <table class="status-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>操作人</th>
                                <th>采集账号</th>
                                <th>作品名称</th>
                                <th>投诉单号</th>
                                <th>状态</th>
                                <th>预估完成时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                data.data.forEach(item => {
                    let timeStr = '-';
                    if (item.submitted_at) {
                        const d = new Date(item.submitted_at);
                        const pad = n => String(n).padStart(2, '0');
                        timeStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                    }

                    let accountStr = item.collect_account || '-';

                    // 作品名称：按逗号分隔，最多展示2行
                    let workNameStr = item.work_name || '-';
                    let workNameParts = [];
                    if (workNameStr.includes(',')) {
                        workNameParts = workNameStr.split(',').map(s => s.trim()).filter(s => s);
                    } else if (workNameStr.includes('，')) {
                        workNameParts = workNameStr.split('，').map(s => s.trim()).filter(s => s);
                    } else {
                        workNameParts = [workNameStr];
                    }
                    if (workNameParts.length > 2) {
                        workNameStr = workNameParts.slice(0, 2).join('<br>') + `<br>...共${workNameParts.length}部`;
                    } else {
                        workNameStr = workNameParts.join('<br>');
                    }

                    // 投诉单号：最多展示2行
                    let complaintStr = '-';
                    if (item.complaint_numbers && item.complaint_numbers.length > 0) {
                        if (item.complaint_numbers.length > 2) {
                            complaintStr = item.complaint_numbers.slice(0, 2).join('<br>') + `<br>...共${item.complaint_numbers.length}条`;
                        } else {
                            complaintStr = item.complaint_numbers.join('<br>');
                        }
                    } else if (item.batch_count) {
                        complaintStr = `${item.batch_count}批(${item.excel_rows}条)`;
                    }

                    let statusClass = 'status-default';
                    if (item.status === '已完成') statusClass = 'status-success';
                    else if (item.status === '执行中') statusClass = 'status-running';
                    else if (item.status === '失败' || item.status === '部分失败') statusClass = 'status-failed';

                    // 预估完成时间（使用全局队列计算）
                    let estimatedTimeStr = '-';
                    if (item.status === '等待中' || item.status === '执行中') {
                        estimatedTimeStr = getEstimatedTime(`uc_${item.submission_id}`);
                    }

                    // 操作列：查看日志 + 导出单号
                    const logUrl = `/uc/task/uc_${item.submission_id}/log`;
                    let opsCell = '';
                    if (item.status === '等待中') {
                        opsCell = '<span class="log-pending">待执行</span>';
                    } else {
                        let ops = [];
                        if (item.log_available) {
                            ops.push(`<a href="${logUrl}" target="_blank" class="log-link">查看日志</a>`);
                        }
                        if (item.status === '已完成' || item.status === '部分失败') {
                            ops.push(`<a href="/api/uc/export_excel/${item.submission_id}" class="log-link">导出单号</a>`);
                        }
                        opsCell = ops.length > 0 ? ops.join(' | ') : '<span class="log-expired">日志已过期</span>';
                    }

                    html += `
                        <tr>
                            <td>${timeStr}</td>
                            <td>${item.operator || '-'}</td>
                            <td>${accountStr}</td>
                            <td style="white-space:normal">${workNameStr}</td>
                            <td style="white-space:normal">${complaintStr}</td>
                            <td><span class="status-badge ${statusClass}">${item.status}</span></td>
                            <td>${estimatedTimeStr}</td>
                            <td>${opsCell}</td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } else {
                container.innerHTML = `
                    <div class="status-empty">
                        <i class="fas fa-inbox fa-2x mb-2"></i>
                        <div>暂无数据</div>
                    </div>
                `;
            }
        })
        .catch(err => {
            container.innerHTML = `
                <div class="status-error">
                    <i class="fas fa-exclamation-triangle"></i>
                    加载失败: ${err}
                </div>
            `;
        })
        .finally(() => {
            setTimeout(() => {
                if (refreshBtn) refreshBtn.disabled = false;
            }, 2000);
        });
}

// 页面加载时自动刷新UC状态
document.addEventListener('DOMContentLoaded', async function() {
    authorizationExpiryModal = new bootstrap.Modal(document.getElementById('authorizationExpiryModal'));
    await loadGlobalQueue();
    refreshUcStatus();
    refreshBaiduStatus();
    setTimeout(() => {
        checkAuthorizationExpiryAlertsOnce();
    }, 1000);
});

function refreshBaiduStatus() {
    const container = document.getElementById('baiduStatusTable');
    const cardHeader = container.closest('.status-card').querySelector('.status-card-header');
    const refreshBtn = cardHeader ? cardHeader.querySelector('button') : null;

    container.innerHTML = '<div class="status-loading"><i class="fas fa-spinner fa-spin"></i> 刷新中...</div>';
    if (refreshBtn) refreshBtn.disabled = true;

    fetch('/api/baidu/status_list')
        .then(res => res.json())
        .then(data => {
            if (data.success && data.data.length > 0) {
                let html = `
                    <table class="status-table">
                        <thead>
                            <tr>
                                <th>时间</th>
                                <th>操作人</th>
                                <th>采集账号</th>
                                <th>作品名称</th>
                                <th>反馈单号</th>
                                <th>状态</th>
                                <th>预估完成时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                data.data.forEach(item => {
                    let timeStr = '-';
                    if (item.submitted_at) {
                        const d = new Date(item.submitted_at);
                        const pad = n => String(n).padStart(2, '0');
                        timeStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
                    }

                    let complaintStr = '-';
                    if (item.complaint_numbers && item.complaint_numbers.length > 0) {
                        if (item.complaint_numbers.length > 2) {
                            complaintStr = item.complaint_numbers.slice(0, 2).join('<br>') + `<br>...共${item.complaint_numbers.length}条`;
                        } else {
                            complaintStr = item.complaint_numbers.join('<br>');
                        }
                    }

                    let statusClass = 'status-default';
                    if (item.status === '已完成') statusClass = 'status-success';
                    else if (item.status === '执行中') statusClass = 'status-running';
                    else if (item.status === '失败' || item.status === '部分失败') statusClass = 'status-failed';

                    let workNameStr = item.work_name || '-';
                    let baiduWorkParts = [];
                    if (workNameStr.includes(',')) {
                        baiduWorkParts = workNameStr.split(',').map(s => s.trim()).filter(s => s);
                    } else if (workNameStr.includes('，')) {
                        baiduWorkParts = workNameStr.split('，').map(s => s.trim()).filter(s => s);
                    } else {
                        baiduWorkParts = [workNameStr];
                    }
                    if (baiduWorkParts.length > 2) {
                        workNameStr = baiduWorkParts.slice(0, 2).join('<br>') + `<br>...共${baiduWorkParts.length}部`;
                    } else {
                        workNameStr = baiduWorkParts.join('<br>');
                    }

                    // 预估完成时间（使用全局队列计算）
                    let baiduEstTimeStr = '-';
                    if (item.status === '等待中' || item.status === '执行中') {
                        baiduEstTimeStr = getEstimatedTime(`baidu_${item.submission_id}`);
                    }

                    let exportCell = '';
                    if (item.status === '已完成' || item.status === '部分失败') {
                        exportCell = `<a href="/api/baidu/export_excel/${item.submission_id}" class="log-link">导出Excel</a>`;
                    }

                    html += `
                        <tr>
                            <td>${timeStr}</td>
                            <td>${item.operator || '-'}</td>
                            <td>${item.collect_account || '-'}</td>
                            <td title="${item.work_name || ''}" style="white-space:normal">${workNameStr}</td>
                            <td>${complaintStr}</td>
                            <td><span class="status-badge ${statusClass}">${item.status}</span></td>
                            <td>${baiduEstTimeStr}</td>
                            <td>${exportCell}</td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                container.innerHTML = html;
            } else {
                container.innerHTML = `
                    <div class="status-empty">
                        <i class="fas fa-inbox fa-2x mb-2"></i>
                        <div>暂无数据</div>
                    </div>
                `;
            }
        })
        .catch(err => {
            container.innerHTML = `
                <div class="status-error">
                    <i class="fas fa-exclamation-triangle"></i>
                    加载失败: ${err}
                </div>
            `;
        })
        .finally(() => {
            setTimeout(() => {
                if (refreshBtn) refreshBtn.disabled = false;
            }, 2000);
        });
}
</script>
